name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    # This example skips untrusted forks so repository secrets are not exposed by default.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AI PR Review Assistant
        run: python -m pip install -e .

      - name: Run PR review and post summary comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: >
          ai-pr-review analyze
          "${{ github.event.pull_request.html_url }}"
          --format markdown
          --output ai-pr-review-report.md
          --comment

      - name: Upload review report
        uses: actions/upload-artifact@v4
        with:
          name: ai-pr-review-report
          path: ai-pr-review-report.md
